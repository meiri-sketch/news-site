<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>סיכום חדשות</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700&family=Frank+Ruhl+Libre:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0f0f10;
    --surface: #1a1a1c;
    --border: #2a2a2d;
    --accent: #e8c547;
    --accent-dim: rgba(232,197,71,0.12);
    --text: #f0ede6;
    --muted: #7a7872;
    --card-bg: #161618;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Heebo', sans-serif;
    min-height: 100vh;
    padding: 0 0 80px;
  }

  /* Header */
  header {
    border-bottom: 1px solid var(--border);
    padding: 28px 24px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    background: rgba(15,15,16,0.92);
    backdrop-filter: blur(12px);
    z-index: 10;
  }

  .logo {
    font-family: 'Frank Ruhl Libre', serif;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }

  .logo span { color: var(--accent); }

  #last-update {
    font-size: 12px;
    color: var(--muted);
  }

  /* Live dot */
  .live {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--accent);
    font-weight: 500;
  }
  .live-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.8); }
  }

  /* Main */
  main {
    max-width: 680px;
    margin: 0 auto;
    padding: 32px 16px 0;
  }

  /* Summary card */
  .summary-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 16px;
    margin-bottom: 16px;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .summary-card:hover { border-color: #3a3a3e; }
  .summary-card.latest {
    border-color: rgba(232,197,71,0.3);
  }

  .card-header {
    padding: 18px 20px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }

  .card-time {
    font-size: 13px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .badge-new {
    background: var(--accent-dim);
    color: var(--accent);
    font-size: 11px;
    font-weight: 500;
    padding: 2px 8px;
    border-radius: 20px;
    border: 1px solid rgba(232,197,71,0.25);
  }

  .card-count {
    font-size: 12px;
    color: var(--muted);
  }

  .card-body {
    padding: 20px;
  }

  .card-body ul {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .card-body li {
    font-size: 15px;
    line-height: 1.65;
    color: #d8d5ce;
    padding-right: 16px;
    position: relative;
  }

  .card-body li::before {
    content: '';
    position: absolute;
    right: 0;
    top: 10px;
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--accent);
    opacity: 0.7;
  }

  /* Raw text fallback */
  .card-body p {
    font-size: 15px;
    line-height: 1.75;
    color: #d8d5ce;
    white-space: pre-wrap;
  }

  /* Empty state */
  #empty {
    text-align: center;
    padding: 80px 20px;
    color: var(--muted);
  }
  #empty .icon { font-size: 40px; margin-bottom: 16px; }
  #empty h3 { font-size: 18px; color: var(--text); margin-bottom: 8px; }

  /* Loading skeleton */
  .skeleton {
    background: linear-gradient(90deg, var(--surface) 25%, #222224 50%, var(--surface) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    border-radius: 8px;
    height: 16px;
    margin-bottom: 10px;
  }
  @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

  /* Mobile */
  @media (max-width: 480px) {
    header { padding: 20px 16px; }
    .logo { font-size: 18px; }
    .card-body li { font-size: 14px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">חדשות <span>●</span> סיכום</div>
  <div style="display:flex;align-items:center;gap:16px">
    <span id="last-update">טוען...</span>
    <div class="live"><div class="live-dot"></div>חי</div>
  </div>
</header>

<main>
  <div id="loading">
    <div class="summary-card" style="padding:20px">
      <div class="skeleton" style="width:40%;margin-bottom:20px"></div>
      <div class="skeleton" style="width:95%"></div>
      <div class="skeleton" style="width:80%"></div>
      <div class="skeleton" style="width:88%"></div>
    </div>
  </div>
  <div id="feed"></div>
  <div id="empty" style="display:none">
    <div class="icon">📭</div>
    <h3>אין סיכומים עדיין</h3>
    <p>הסיכום הראשון יופיע כשהסקריפט יריץ</p>
  </div>
</main>

<script>
const DATA_URL = 'summaries.json';

function parseItems(text) {
  const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
  const items = lines.filter(l =>
    l.startsWith('•') || l.startsWith('-') || l.startsWith('*') || /^\d+\./.test(l)
  ).map(l => l.replace(/^[•\-\*]|\d+\./, '').trim()).filter(l => l.length > 5);
  return items.length >= 2 ? items : null;
}

function renderCard(s, isLatest) {
  const card = document.createElement('div');
  card.className = 'summary-card' + (isLatest ? ' latest' : '');

  const date = new Date(s.timestamp);
  const timeStr = date.toLocaleString('he-IL', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' });

  const items = parseItems(s.text);
  let bodyHtml;
  if (items) {
    bodyHtml = '<ul>' + items.map(i => `<li>${i}</li>`).join('') + '</ul>';
  } else {
 const formatted = s.text
  .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
  .replace(/\n/g, '<br>');
bodyHtml = `<p>${formatted}</p>`;
  }

  card.innerHTML = `
    <div class="card-header">
      <div class="card-time">
        🕐 ${timeStr}
        ${isLatest ? '<span class="badge-new">חדש</span>' : ''}
      </div>
      <div class="card-count">${s.count || ''} פריטים</div>
    </div>
    <div class="card-body">${bodyHtml}</div>`;
  return card;
}

async function load() {
  try {
    const r = await fetch(DATA_URL + '?t=' + Date.now());
    if (!r.ok) throw new Error();
    const data = await r.json();

    document.getElementById('loading').style.display = 'none';
    const feed = document.getElementById('feed');
    feed.innerHTML = '';

    if (!data.summaries || data.summaries.length === 0) {
      document.getElementById('empty').style.display = 'block';
      return;
    }

    const sorted = [...data.summaries].reverse();
    sorted.forEach((s, i) => feed.appendChild(renderCard(s, i === 0)));

    const last = new Date(sorted[0].timestamp);
  document.getElementById('last-update').textContent =
      'עודכן: ' + last.toLocaleTimeString('he-IL', { hour:'2-digit', minute:'2-digit' });

  } catch {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('empty').style.display = 'block';
  }
}

load();
setInterval(load, 5 * 60 * 1000); // רענון כל 5 דקות
</script>
</body>
</html>
